<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Loja | Jobee</title>
  <link rel="stylesheet" href="/css/global.css" />
  <link rel="stylesheet" href="/css/navbar.css" />
  <style>
    .loja-page {
      max-width: 1200px;
      margin: 0 auto;
      padding: 32px 20px;
    }

    .loja-header {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 24px;
      align-items: center;
      margin-bottom: 40px;
    }

    .loja-header img {
      width: 100%;
      max-width: 320px;
      border-radius: 16px;
      object-fit: cover;
    }

    .loja-header-info h1 {
      margin-bottom: 12px;
      font-size: 2rem;
    }

    .loja-header-info p {
      color: #555;
      line-height: 1.6;
    }

    .secao-itens {
      margin-top: 36px;
    }

    .secao-itens h2 {
      margin-bottom: 18px;
    }

    .grid-itens {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 20px;
    }

    .item-card {
      background: #fff;
      border: 1px solid #e5e5e5;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(0,0,0,0.06);
    }

    .item-card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
    }

    .item-card-content {
      padding: 16px;
    }

    .item-card-content h3 {
      margin-bottom: 10px;
      font-size: 1.1rem;
    }

    .item-card-content p {
      color: #555;
      margin-bottom: 12px;
      min-height: 48px;
    }

    .item-meta {
      display: flex;
      flex-direction: column;
      gap: 6px;
      font-size: 0.95rem;
    }

    .voltar-home {
      display: inline-block;
      margin-bottom: 24px;
      text-decoration: none;
      font-weight: 600;
    }

    @media (max-width: 768px) {
      .loja-header {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div id="navbar-container"></div>

  <main class="loja-page">
    <a href="/" class="voltar-home">← Voltar para a Home</a>

    <section class="loja-header">
      <img id="imagem-loja" src="/img/placeholder-loja.png" alt="Imagem da loja" />
      <div class="loja-header-info">
        <h1 id="nome-loja">Carregando loja...</h1>
        <p id="descricao-loja">Aguarde enquanto carregamos as informações.</p>
      </div>
    </section>

    <section class="secao-itens">
      <h2>Produtos</h2>
      <div class="grid-itens" id="lista-produtos"></div>
    </section>

    <section class="secao-itens">
      <h2>Serviços</h2>
      <div class="grid-itens" id="lista-servicos"></div>
    </section>
  </main>

  <script src="/js/navbar.js" defer></script>
  <script src="/js/loja.js" defer></script>
</body>
</html>
