<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Loja | Jobee</title>
  <link rel="stylesheet" href="/css/global.css" />
  <link rel="stylesheet" href="/css/navbar.css" />
  <link rel="stylesheet" href="/css/lojas.css">
</head>
<body>
  <div id="navbar-container"></div>
    <section class="sub-navbar" aria-label="Atalhos de navegação">
    <div class="dropdown-categorias">
      <a href="#" class="categorias-btn" aria-haspopup="true" aria-expanded="false">Categorias ▼</a>
      <ul class="menu-categorias">
        <li><a href="#">Supermercado</a></li>
        <li><a href="#">Tecnologia</a></li>
        <li><a href="#">Casa e Móveis</a></li>
        <li><a href="#">Eletrodomésticos</a></li>
        <li><a href="#">Esportes e Fitness</a></li>
        <li><a href="#">Ferramentas</a></li>
        <li><a href="#">Moda</a></li>
        <li><a href="#">Beleza e Cuidados</a></li>
      </ul>
    </div>
    <a href="#">Ofertas</a>
    <a href="#">Cupons</a>
    <a href="#">Serviços</a>
    <a href="#">Contato</a>
  </section>
  <main class="loja-page">
    <a href="/" class="voltar-home">← Voltar para a Home</a>

    <section class="loja-header">
      <img id="imagem-loja" src="/img/placeholder-loja.png" alt="Imagem da loja" />

        <h1 id="nome-loja">Carregando loja...</h1>
        <p id="descricao-loja">Aguarde enquanto carregamos as informações.</p>
      </div>
    </section>

    <section class="secao-itens">
      <h2>Produtos</h2>
      <div class="grid-itens" id="lista-produtos"></div>
    </section>

    <section class="secao-itens">
      <h2>Serviços</h2>
      <div class="grid-itens" id="lista-servicos"></div>
    </section>
  </main>

  <script src="/js/navbar.js" defer></script>
  <script src="/js/loja.js" defer></script>
</body>
</html>
